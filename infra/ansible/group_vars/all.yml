---
# Variables shared across all hosts and plays

# Project metadata
project_name: intelligent-fintech-platform
project_user: "{{ ansible_user_id }}"

# Pinned versions (reproducibility — don't let apt give us 'latest')
docker_compose_version: "2.29.2"
minikube_version: "v1.38.1"
kubectl_version: "v1.31.0"
java_version: "17"
maven_version: "3.9.9"
jenkins_apt_key_url: "https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key"
gitleaks_version: "8.21.2"
trivy_version: "0.70.0"

# Cluster sizing (minikube)
minikube_memory: "4096"
minikube_cpus: "2"
minikube_driver: "docker"

# Timezone
system_timezone: "Etc/UTC"
