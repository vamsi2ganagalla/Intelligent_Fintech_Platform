---
# Master playbook — runs all roles in order
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/setup.yml --ask-become-pass
# (Phase 5.1 only includes the common role — more added in subsequent phases)

- name: Provision Intelligent FinTech Platform infrastructure
  hosts: local
  become: true
  gather_facts: true

  roles:
    - role: common
      tags: [common, base]

    - role: docker
      tags: [docker]

    - role: kubernetes
      tags: [kubernetes, k8s]

    - role: java_maven
      tags: [java, maven]

    - role: jenkins
      tags: [jenkins, ci]

    - role: devsecops_tools
      tags: [devsecops, security]

    # Phases 5.7-5.8 will add: app_deploy, full orchestration
