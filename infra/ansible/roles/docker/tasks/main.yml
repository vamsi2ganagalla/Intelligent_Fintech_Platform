---
# docker role — install Docker CE from upstream apt repo

- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker apt GPG key
  ansible.builtin.get_url:
    url: "{{ docker_apt_key_url }}"
    dest: "{{ docker_apt_keyring_path }}"
    mode: "0644"
    force: false  # don't re-download if file exists

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "{{ docker_apt_repo }}"
    state: present
    filename: docker
    update_cache: true

- name: Install Docker CE packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present

- name: Ensure /etc/docker directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Configure Docker daemon (daemon.json — log rotation, live-restore)
  ansible.builtin.copy:
    content: "{{ docker_daemon_config | to_nice_json }}\n"
    dest: /etc/docker/daemon.json
    mode: "0644"
    backup: true
  notify: "restart docker"

- name: Add dev user to docker group
  ansible.builtin.user:
    name: "{{ docker_dev_user }}"
    groups: docker
    append: true  # don't remove from other groups

- name: Enable and start Docker systemd service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Summary - docker role complete
  ansible.builtin.debug:
    msg:
      - "Docker version: {{ ansible_facts.packages['docker-ce'][0].version | default('unknown') }}"
      - "Daemon config: /etc/docker/daemon.json (log rotation enabled)"
      - "User {{ docker_dev_user }} in docker group"
      - "Service: enabled and running"
